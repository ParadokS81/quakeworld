alias _attack                 ".attack"
alias _cancel                 ".cancel"
alias _coming                 "if $health > 0 then .coming else .coming2"
alias _communicate            "_devtook; inc _ctrl 1"
alias _commusettookdo         "set_tp mytook $took; wait;set_tp mytookloc $tookloc; wait"
alias _commusettookif1        "if ('$took' != '$lasttook' || '$tookloc' != '$mytookloc')  then _commusettookif2"
alias _commusettookif2        "_commusettookif3"
alias _commusettookif3        "if '$took' != '$tp_name_nothing' then _commusettookdo"
alias _devdoreport            "_report; set_tp _prevhealth $health; set_tp _prevarmor $armor"
alias _devreport              "if $health <= 0 then _dolost else if ($health + $_healthtrigger) <= $_prevhealth then _devdoreport else if ($armor + $_armortrigger) <= $_prevarmor then _devdoreport else if $_ctrl > $_ctrltrigger then _resetctrl"
alias _devtook                "_commusettookif1; wait; wait; _devtookdo"
alias _devtook2on2            "if $mytook == $tp_name_nothing then _devreport else if $mytook == $tp_name_mh then _domega else if $mytook == $tp_name_ra then _dora else if $mytook == $tp_name_ya then _doya else if $mytook == $tp_name_quad then _doquad else _took"
alias _devtook4on4            "if $mytook == $tp_name_nothing then _devreport else _took"
alias _devtookdo              "_devtook4on4"
alias _devtooklastlocset      "if $mytook != $tp_name_nothing then set_tp lasttookloc $mytookloc"
alias _devtooklastset         "if $mytook != $tp_name_nothing then set_tp lasttook $mytook"
alias _devtookreset           "set_tp mytook $tp_name_nothing"
alias _dolost                 "_lost00; set_tp _prevhealth 100; set_tp _prevarmor 0"
alias _domega                 "_tookmega; set_tp _prevhealth $health; set_tp _prevarmor $armor"
alias _doquad                 "_tookquad"
alias _dora                   "_tookra; set_tp _prevhealth $health; set_tp _prevarmor $armor"
alias _doya                   "_tookya; set_tp _prevhealth $health; set_tp _prevarmor $armor"
alias _enemy_powerups         ".enemy_powerups"
alias _get_my_stuff           "_get_my_stuff_sw; if ($health < 1) then .borepacks else if ('rl' isin '$weapons') then .get_my_rl else if ('lg' isin '$weapons') then .get_my_lg else if ($cells > 0) then .get_my_cells else if (('$mapname' = 'e1m2' or '$mapname' = 'dm2') and $rockets > 0) then .get_my_rockets else .borepacks"
alias _get_my_stuff_sw        "impulse 7 8 6 5 3 2"
alias _getpent                "if $tp_name_pent isin $powerups then .team_powerups else .getpent"
alias _getquad                "if ($health > 0 and '$tp_name_quad' isin '$powerups') then .team_powerups else .getquad"
alias _help                   ".help"
alias _lost                   "if $matchtype = $qt4on4$qt then _lost00 else .lost"
alias _lost00                 "if ($health < 0 and '$tp_name_quad' isin '$powerups') then .quad_over; if $qt$weapon$qt = $qt$tp_name_rl$qt then .packleft_rl else if $qt$weapon$qt = $qt$tp_name_lg$qt then .packleft_lg else .lost"
alias _need                   "if $need != $tp_name_nothing then .need"
alias _nothing                ""
alias _packleft               ".packleft"
alias _point                  "shownick; if ('$point' != '$tp_name_nothing' and '$ledpoint' != '$G') then .point"
alias _quad_over              "if ($health > 0 and '$tp_name_quad' isin '$powerups') then .team_powerups else .quad_over"
alias _replace                ".replace"
alias _report                 "if $health < 1 then _lost00 else _report2"
alias _report2                "if $bestweapon = rl then _report_rl else if $bestweapon = lg then _report_lg else _report3"
alias _report3                "if $armor > 0 then _report_armor else _report_noweapon"
alias _report_armor           "if $cells > 10 then .report_armor_cells else .report_armor"
alias _report_lg              "if ('health' isin '$need' and 'armor' isin '$need' and $cells < 10) then .report_lg_h0_a0_am0 else if ('health' isin '$need' and 'armor' isin '$need') then .report_lg_h0_a0_am1 else if ('health' isin '$need' and $cells < 10) then .report_lg_h0_a1_am0 else if ('armor' isin '$need' and $cells < 10) then .report_lg_h1_a0_am0 else if ('health' isin '$need') then .report_lg_h0_a1_am1 else if ('armor' isin '$need') then .report_lg_h1_a0_am1 else if ($cells < 10) then .report_lg_h1_a1_am0 else .report_lg_h1_a1_am1"
alias _report_noweapon        "if $cells > 10 then .report_cells else .report"
alias _report_rl              "if lg isin $weapons then _report_rlg else _report_rl_2"
alias _report_rl_2            "if ('health' isin '$need' and 'armor' isin '$need' and 'rockets' isin '$need') then .report_rl_h0_a0_am0 else if ('health' isin '$need' and 'armor' isin '$need') then .report_rl_h0_a0_am1 else if ('health' isin '$need' and 'rockets' isin '$need') then .report_rl_h0_a1_am0 else if ('armor' isin '$need' and 'rockets' isin '$need') then .report_rl_h1_a0_am0 else if ('health' isin '$need') then .report_rl_h0_a1_am1 else if ('armor' isin '$need') then .report_rl_h1_a0_am1 else if ('rockets' isin '$need') then .report_rl_h1_a1_am0 else .report_rl_h1_a1_am1"
