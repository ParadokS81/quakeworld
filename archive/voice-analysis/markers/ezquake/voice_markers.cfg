// QW Voice Analysis - ezQuake marker aliases
// Add these two alias lines to your config.cfg, or exec this file in console.
//
// These fire automatically when KTX match starts/ends because your config
// has: alias infoset "cmd info ev 12" (enables on_matchstart + on_matchend)
//
// on_matchstart: starts a real-time console log, then writes the marker
// on_matchend:   writes the marker, then stops the log
//
// The AHK script watches voice_marker.log for these markers in real-time.
//
// NOTE: match_auto_logconsole must be 0 (auto console logging conflicts
// with the log command). Match data can be derived from QWD demos instead.

alias on_matchstart "log voice_marker; echo [MARKER_START] >>> MATCH STARTED"
alias on_matchend   "echo [MARKER_END] >>> MATCH ENDED; log stop"
