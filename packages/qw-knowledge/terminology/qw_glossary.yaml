# QW Voice Analysis - QuakeWorld Glossary
# Terms for Whisper initial_prompt and Claude analysis context
# Corrected with actual ]sr[ team callout conventions

items:
  powerups:
    - quad      # Quad Damage (4x damage, 30s, respawns every 60s)
    - pent      # Pentagram of Protection (invulnerability, 30s)
    - ring      # Ring of Shadows (invisibility, 30s)
  armor:
    - red       # Red Armor (200 armor) - called "red" not "ra"
    - yellow    # Yellow Armor (150 armor) - called "yellow" not "ya"
    - green     # Green Armor (100 armor) - called "green" not "ga"
  health:
    - mega      # Megahealth (100hp, decays)
  weapons:
    - rocket    # Rocket Launcher (30s respawn)
    - shaft     # Lightning Gun - also called "lg" or "lightning gun"
    - grenade   # Grenade Launcher
    - sng       # Super Nailgun - also called "super nailgun"
    - nailgun   # Nailgun
    - buckshot  # Super Shotgun (SSG)
    - boomstick # Shotgun (SG) - also called "shotgun"

actions:
  - get quad        # Pick up Quad Damage
  - quad soon       # Quad spawning soon
  - quad up         # Quad has spawned
  - pack            # Backpack (dropped items from kill)
  - bore pack       # Self-rocket to drop a pack with RL for teammate (also "bore packs")
  - tp              # Teleporter
  - tele            # Teleporter (more common spoken form)
  - spawn           # Respawn point
  - stack           # Well-equipped (high health + armor)
  - stacked         # Very well-equipped
  - fat             # Same as stacked - well-equipped
  - strong          # Same as stacked - well-equipped
  - weak            # Low on health/armor - "im fucking weak"
  - almost dead     # Very low health
  - so dead         # About to die
  - one shot        # Enemy is nearly dead
  - out             # Died / lost control
  - lost            # Died (often triggers mm2 death message showing location)
  - coming          # Moving towards a location
  - holding         # Controlling an area
  - push            # Aggressive move together
  - fall back       # Retreat
  - regroup         # Meet up at a location
  - lock            # Hold position / lock down area
  - map lock        # Team has full map control (enemy can't get weapons)
  - spam            # Shoot at area for denial
  - safe            # Area is clear / under control (e.g. "back safe")
  - zone            # Holding/controlling a zone (e.g. "red zone")
  - flood           # Multiple enemies rushing an area (e.g. "they flood me")
  - build           # Gather weapons/armor before a push (e.g. "build for penta")
  - gl hf           # Good luck have fun (pre-match)
  - team quad       # Calling for team to group for quad pickup
  - team pent       # Calling for team to group for pent
  - slip            # Enemy teleported (slipped) through YA tele to high (dm2-specific)
  - brösting        # Swedish term: self-damage (like chest-bumping) - doing self-rocket damage

# Item timing callouts
# Weapons respawn every 30 seconds. Players have in-game clocks counting up.
# When you pick up a weapon at 12:15, you say "rocket on 45" (spawns at xx:45)
timing_patterns:
  # "[location/item] on [time]" - item spawns at that second mark of the current minute
  # "[location/item] in [x]" - item spawns in x seconds from now
  # Examples:
  #   "red on 20" = red armor spawns at second 20 of current minute
  #   "red in 10" = red armor spawns in 10 seconds
  #   "low on 32" = weapon at low location spawns at second 32
  #   "high on 45" = weapon at high location spawns at second 45
  # Locations are often used instead of item names when a weapon is tied to a spot

# Note: "low" in callouts usually refers to a map location (low rocket, low area),
# NOT low health. Low health is expressed as "weak", "almost dead", "so dead".

# Communication meta-patterns
# Understanding HOW things are said, not just WHAT is said
communication_patterns:
  # Voice (mm3) and text (mm2) complement each other
  # mm2 = teamplay text messages (binds for location reports, death messages, item timing)
  # mm3 = voice communication via Discord (callouts, coordination, reactions)
  # Players have keybinds for mm2: "lost" button shows death location on team text chat
  # Death to enemy weapon is always reported (shows where enemy RL/LG is)
  # Random deaths (bad spawns, suicides) don't always need voice callout

  # Weapon tracking is rapid-fire sequential callouts
  # When an enemy has RL/LG, the team tracks their movement in real-time:
  # "rocket red" -> "rocket tunnel" -> "rocket low" -> "rocket bridge"
  # This means one enemy with rocket launcher moving through those locations
  # The weapon name IS the enemy identifier in these sequences

  # Call urgency maps to voice volume and repetition
  # More critical = louder, faster, repeated: "take the rocket, take the rocket"
  # Routine calls are calm: "yellow safe", "red zone"
  # Panic/excitement: "he's weak, he's weak, he's weak" (urgent kill opportunity)

  # Unfinished sentences are normal
  # Players cut themselves off when: the situation changed, someone said something
  # more important, or the info became irrelevant (enemy died, item was taken)
  # Fragments like "he's", "I", "they" are natural, not transcription errors

  # Quad timing is approximate by convention
  # "quad soon" = within ~10 seconds. Exact second often unknown because
  # the cycle drifts by a few seconds each minute (pickup delay).
  # More precise timing ("quad on 45") used when the player saw the pickup.

  # Enemy name as identifier
  # Players call out specific enemy names when tracking: "Milton has rocket"
  # One stacked enemy is a bigger threat than 3 weak ones, so names matter
  # The best/most dangerous enemy gets tracked by name more often

  # Context-dependent callouts
  # "he's weak" without location is valid when multiple teammates are fighting
  # the same enemy in one area - everyone knows who and where
  # "I'm here" / "there's a rocket there" is valid when players have line of sight
  # to each other in-game - they share spatial context that the transcript lacks
  # "boomstick at [location]" means a non-weapon enemy (only has SG)
  # Context-dependent: can mean "safe to push, easy kill" OR "warning: enemy there"
  # depending on whether the listener is strong or weak. Transcript alone can't tell.

  # Slipping (dm2-specific)
  # "they slipped" / "enemy slip" ALWAYS means enemy went through YA tele to high
  # This is a specific dm2 mechanic - the YA teleporter is the only tele on dm2

# Common Whisper transcription errors (misheard QW terms)
# Used to flag known error patterns and improve future accuracy
whisper_corrections:
  # Player names often misheard
  - misheard: "myrton"
    correct: "Milton"
    context: "opponent player name"
  - misheard: "borpax"
    correct: "bore packs"
    context: "self-rocket to drop pack with RL"
  - misheard: "mutant"
    correct: "Milton"
    context: "opponent player name"
  - misheard: "Minotone"
    correct: "Milton"
    context: "opponent player name"
  - misheard: "grizzling"
    correct: "grisling"
    context: "teammate player name"
  # Location/callout misheards
  - misheard: "rock tie"
    correct: "rock high"
    context: "rocket at high RL location (tie sounds like high)"
  - misheard: "breasted"
    correct: "brösting"
    context: "Swedish term for self-damage (self-rocket). Used by carapace"
  - misheard: "weak in pot"
    correct: "weak in path"
    context: "enemy weak at path location"
  - misheard: "house backroom"
    correct: "our backroom"
    context: "backroom is under our control / safe"
  - misheard: "soldered"
    correct: "so dead"
    context: "zero's pronunciation of 'so dead' - means completely dead / no chance"
  - misheard: "I'm sold out"
    correct: "I'm so dead"
    context: "zero - same as soldered, means dead or about to die"
  - misheard: "woody"
    correct: "unknown - needs verification"
    context: "possibly opponent name or location"

# Known player names (opponents and teammates) for Whisper vocab biasing
